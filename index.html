<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ShinaPro — Учёт Шиномонтажа</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
/* ====== ROOT VARS ====== */
:root {
  --primary: #3b82f6;
  --primary-rgb: 59,130,246;
  --primary-glow: rgba(59,130,246,0.25);
  --bg-body: #0f172a;
  --bg-card: rgba(30,41,59,0.9);
  --bg-card-hover: rgba(51,65,85,0.95);
  --bg-input: rgba(15,23,42,0.6);
  --text-main: #f1f5f9;
  --text-muted: #94a3b8;
  --border: rgba(148,163,184,0.12);
  --border-hover: rgba(148,163,184,0.25);
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --font-scale: 1;
  --sidebar-w: 240px;
  --header-h: 62px;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 20px rgba(0,0,0,0.2);
  --shadow-lg: 0 20px 48px rgba(0,0,0,0.35);
}

/* ====== RESET ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg-body);color:var(--text-main);
  font-size:calc(14px * var(--font-scale));
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  transition:background .3s,color .3s;
}
input,select,textarea,button{font-family:inherit;border:none;background:transparent;color:inherit;font-size:inherit;outline:none}
button{cursor:pointer;user-select:none;touch-action:manipulation}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ====== THEMES ====== */
.t-light{
  --bg-body:#f1f5f9;--bg-card:#fff;--bg-card-hover:#f8fafc;--bg-input:#f1f5f9;
  --text-main:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--border-hover:#cbd5e1;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}

/* ====== DESIGN: GLASS ====== */
.d-glass{
  --bg-body:#030712;--bg-card:rgba(255,255,255,0.04);--bg-card-hover:rgba(255,255,255,0.07);
  --bg-input:rgba(0,0,0,0.25);--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.14);
}
.d-glass .app-bg{
  background:
    radial-gradient(ellipse at 10% 50%,rgba(var(--primary-rgb),.1) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 20%,rgba(139,92,246,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 100%,rgba(16,185,129,.06) 0%,transparent 50%),
    #030712;
}
.d-glass.t-light{
  --bg-body:#eef2f7;--bg-card:rgba(255,255,255,.7);--bg-card-hover:rgba(255,255,255,.9);
  --bg-input:rgba(255,255,255,.55);--border:rgba(50,50,93,.08);--text-main:#1e293b;--text-muted:#64748b;
}
.d-glass.t-dark{
  --bg-body:#030712;--bg-card:rgba(255,255,255,0.04);--bg-card-hover:rgba(255,255,255,0.07);
  --bg-input:rgba(0,0,0,0.25);--border:rgba(255,255,255,0.07);--text-main:#f1f5f9;--text-muted:#94a3b8;
}

/* ====== DESIGN: SOFT ====== */
.d-soft,.d-soft.t-light{
  --bg-body:#f3f4f6;--bg-card:#fff;--bg-card-hover:#f9fafb;--bg-input:#f3f4f6;
  --text-main:#111827;--text-muted:#6b7280;--border:#e5e7eb;--primary-glow:transparent;
  --shadow:0 2px 8px rgba(0,0,0,0.06);
}
.d-soft.t-dark{
  --bg-body:#0d1117;--bg-card:#161b22;--bg-card-hover:#21262d;--bg-input:#0d1117;
  --text-main:#c9d1d9;--text-muted:#8b949e;--border:#30363d;--primary-glow:transparent;
}

/* ====== NO ANIM ====== */
.no-anim *{animation-duration:0s!important;transition-duration:0s!important}

/* ====== LAYOUT ====== */
.app-bg{display:flex;height:100%;width:100%}

/* ====== SIDEBAR ====== */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg-card);border-right:1px solid var(--border);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:20;
}
.logo-area{
  height:var(--header-h);display:flex;align-items:center;padding:0 18px;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo-icon{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary) 0%,color-mix(in srgb,var(--primary),#000 30%) 100%);
  border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:1rem;
  box-shadow:0 4px 14px var(--primary-glow);
}
.logo-text{font-weight:800;font-size:1.15rem;letter-spacing:-0.5px;line-height:1.1}
.logo-sub{font-size:.65rem;color:var(--text-muted);font-weight:500;margin-top:1px}
.nav-menu{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--text-muted);
  border-radius:10px;transition:all .2s;font-weight:600;font-size:.875rem;cursor:pointer;
  border:1px solid transparent;text-align:left;
}
.nav-item:hover{background:var(--bg-card-hover);color:var(--text-main)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(var(--primary-rgb),.15),rgba(var(--primary-rgb),.08));
  color:var(--primary);border-color:rgba(var(--primary-rgb),.2);
}
.nav-icon svg{width:18px;height:18px;flex-shrink:0}
.nav-label{font-size:.875rem}
.sidebar-footer{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.sidebar-calc-btn{
  width:100%;padding:10px 12px;border-radius:10px;text-align:left;font-size:.85rem;
  font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);
  transition:all .2s;display:flex;align-items:center;gap:8px;
}
.sidebar-calc-btn:hover{color:var(--text-main);border-color:var(--border-hover)}

/* ====== MAIN ====== */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top-header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;border-bottom:1px solid var(--border);background:var(--bg-card);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0;z-index:10;
}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-title{font-size:1.2rem;font-weight:800;letter-spacing:-0.4px;line-height:1}
.header-date{font-size:.72rem;color:var(--text-muted);font-weight:500;text-transform:capitalize}
.header-actions{display:flex;gap:6px;align-items:center}
.content-scroll{flex:1;overflow-y:auto;padding:18px 22px 90px}

/* ====== ICON BTN ====== */
.icon-btn{
  width:38px;height:38px;border-radius:9px;background:var(--bg-input);border:1px solid var(--border);
  color:var(--text-main);display:grid;place-items:center;transition:all .18s;font-size:1rem;
}
.icon-btn svg{width:17px;height:17px}
.icon-btn:hover{border-color:rgba(var(--primary-rgb),.5);color:var(--primary);background:rgba(var(--primary-rgb),.08)}
.icon-btn:active{transform:scale(.91)}
.icon-btn.active{background:rgba(var(--primary-rgb),.15);color:var(--primary);border-color:rgba(var(--primary-rgb),.35)}
.icon-btn:disabled{opacity:.28;cursor:not-allowed;transform:none!important}
.icon-btn:disabled:hover{border-color:var(--border);color:var(--text-muted);background:var(--bg-input)}

/* ====== TAB TOOLBAR ====== */
.tab-toolbar{
  display:flex;gap:8px;padding:10px;border-radius:14px;border:1px solid var(--border);
  background:var(--bg-card);flex-wrap:wrap;align-items:center;margin-bottom:14px;
}
.toolbar-right{display:flex;gap:8px;align-items:center;flex:1;justify-content:flex-end;flex-wrap:wrap}

/* ====== PERIOD PILL ====== */
.period-pill{
  display:flex;background:var(--bg-input);border-radius:9px;border:1px solid var(--border);
  overflow:hidden;flex-shrink:0;
}
.pp-btn{
  padding:6px 11px;font-size:.78rem;font-weight:600;color:var(--text-muted);transition:all .18s;
  white-space:nowrap;
}
.pp-btn:hover{color:var(--text-main)}
.pp-btn.active{
  background:var(--bg-card);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.12);
  border-radius:7px;margin:2px;padding:4px 9px;
}

/* ====== DASH ====== */
.dash-period-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.dash-meta{display:flex;gap:6px;flex-wrap:wrap}
.meta-badge{
  padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;
  background:var(--bg-input);color:var(--text-muted);border:1px solid var(--border);
}
.meta-badge.danger{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.2)}
.meta-badge.warn{background:rgba(245,158,11,.1);color:var(--warning);border-color:rgba(245,158,11,.2)}

/* ====== STAT GRID ====== */
.stat-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;
}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
  transition:all .25s;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:.25s;
  background:linear-gradient(135deg,rgba(var(--primary-rgb),.04),transparent);
}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(var(--primary-rgb),.25);box-shadow:var(--shadow)}
.stat-card:hover::before{opacity:1}
.stat-card-main{grid-column:span 2}
@media(max-width:680px){.stat-card-main{grid-column:span 1}}
.stat-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.stat-icon{
  width:34px;height:34px;border-radius:8px;background:var(--bg-input);
  display:grid;place-items:center;color:var(--text-muted);flex-shrink:0;transition:all .25s;
}
.stat-icon svg{width:17px;height:17px}
.stat-card:hover .stat-icon{background:rgba(var(--primary-rgb),.15);color:var(--primary)}
.stat-label{font-size:.7rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stat-value{font-size:1.7rem;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-footer{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--text-muted);gap:8px}

/* ====== INFO GRID ====== */
.info-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:14px;
}
.info-item{
  background:var(--bg-input);border-radius:11px;padding:12px;border:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;transition:border-color .18s;
}
.info-item:hover{border-color:var(--border-hover)}
.info-label{font-size:.65rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.info-val{font-size:.95rem;font-weight:700}

/* ====== CONTROLS BAR ====== */
.controls-bar{
  display:flex;gap:8px;padding:10px;border-radius:14px;border:1px solid var(--border);
  background:var(--bg-card);flex-wrap:wrap;align-items:center;
}

/* ====== SEARCH RESULTS ====== */
.search-results{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.search-result-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
  animation:fadeIn .2s ease-out;transition:border-color .18s;
}
.search-result-card:hover{border-color:rgba(var(--primary-rgb),.3)}
.plate-badge{
  display:inline-block;background:var(--bg-input);border:1px solid var(--border);
  border-radius:5px;padding:1px 6px;font-size:.75rem;font-weight:700;margin-left:8px;
  font-family:monospace;letter-spacing:.5px;
}

/* ====== BUTTONS ====== */
.btn{
  padding:0 18px;height:40px;border-radius:9px;font-weight:600;display:inline-flex;
  align-items:center;justify-content:center;gap:7px;font-size:.87rem;transition:all .18s;
  white-space:nowrap;border:1px solid transparent;
}
.btn svg{width:16px;height:16px}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px var(--primary-glow)}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 4px 14px var(--primary-glow)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{filter:brightness(1.08)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text-main);background:var(--bg-input)}
.btn-sm{height:32px;padding:0 12px;font-size:.8rem;border-radius:7px}

/* ====== SEARCH INPUT ====== */
.search-input{
  flex:1;background:var(--bg-input);border:1px solid transparent;padding:0 14px;height:40px;
  border-radius:9px;color:var(--text-main);min-width:140px;transition:all .2s;font-weight:500;
}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:rgba(var(--primary-rgb),.5);box-shadow:0 0 0 3px var(--primary-glow);background:var(--bg-card)}

/* ====== DATA TABLE ====== */
.tbl-wrap{
  border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);
  overflow:hidden;display:flex;flex-direction:column;
}
.tbl-scroll{overflow:auto;flex:1}
.dtable{width:100%;border-collapse:collapse;text-align:left}
.dtable th{
  position:sticky;top:0;z-index:5;background:var(--bg-card);color:var(--text-muted);font-weight:700;
  font-size:.69rem;text-transform:uppercase;letter-spacing:.7px;padding:13px 12px;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;
  transition:color .15s;
}
.dtable th:hover{color:var(--primary)}
.dtable th.sorted{color:var(--primary)}
.dtable th .sort-arrow{margin-left:4px;opacity:.5;font-size:.7rem}
.dtable th.sorted .sort-arrow{opacity:1}
.dtable td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.dtable tr{transition:background .12s}
.dtable tr:hover td{background:var(--bg-card-hover)}
.dtable tr:last-child td{border-bottom:none}
.compact-mode .dtable td{padding:6px 10px}
.compact-mode .dtable th{padding:9px 10px}

/* Row states */
.row-warn{border-left:3px solid var(--warning)}
.row-out{border-left:3px solid rgba(239,68,68,.4);opacity:.7}
.row-paid{opacity:.45}

/* ====== TINPUT ====== */
.tinput{
  background:transparent;border:1px solid transparent;color:inherit;padding:5px 8px;
  border-radius:6px;width:100%;transition:all .15s;font-weight:500;
}
.tinput:hover{background:var(--bg-input)}
.tinput:focus{background:var(--bg-input);border-color:rgba(var(--primary-rgb),.45);
  box-shadow:0 0 0 2px var(--primary-glow)}

/* ====== TABLE FOOTER ====== */
.table-foot td{
  background:rgba(var(--primary-rgb),.04)!important;
  border-top:2px solid rgba(var(--primary-rgb),.15)!important;
  padding:10px 12px!important;
}
.foot-label{font-size:.75rem;font-weight:700;color:var(--text-muted)}
.foot-val{font-weight:700;color:var(--text-main)}

/* ====== TOTAL PILL ====== */
.total-pill{
  display:inline-block;padding:4px 10px;border-radius:6px;font-weight:700;font-size:.875rem;
}
.total-inc{background:rgba(16,185,129,.12);color:var(--success)}
.total-exp{background:rgba(239,68,68,.1);color:var(--danger)}

/* ====== BADGE / VISITS ====== */
.visits-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:28px;height:24px;border-radius:6px;font-weight:700;font-size:.82rem;
  background:rgba(var(--primary-rgb),.12);color:var(--primary);padding:0 6px;
}
.count-badge{
  font-size:.78rem;font-weight:700;color:var(--text-muted);white-space:nowrap;
  background:var(--bg-input);padding:4px 10px;border-radius:20px;border:1px solid var(--border);
}

/* ====== STOCK BADGES ====== */
.stock-badge{
  display:inline-block;padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:700;
  flex-shrink:0;letter-spacing:.3px;
}
.stock-badge.low{background:rgba(245,158,11,.15);color:var(--warning)}
.stock-badge.out{background:rgba(239,68,68,.12);color:var(--danger)}

/* ====== WAREHOUSE PILLS ====== */
.warehouse-pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.wh-stat{
  font-size:.78rem;font-weight:700;padding:4px 10px;border-radius:20px;
  background:var(--bg-input);color:var(--text-muted);border:1px solid var(--border);
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.wh-stat svg{width:12px;height:12px}
.wh-stat.warn{background:rgba(245,158,11,.1);color:var(--warning);border-color:rgba(245,158,11,.25)}
.wh-stat.danger{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.25)}

/* ====== DEBT ====== */
.debt-summary{flex:1}
.debt-total-badge{
  display:inline-block;padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:700;
  background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);
}
.status-btn{
  width:100%;height:30px;border-radius:7px;font-size:.78rem;font-weight:700;transition:all .18s;
  border:1px solid transparent;display:flex;align-items:center;justify-content:center;gap:4px;
}
.status-btn.paid{background:rgba(16,185,129,.12);color:var(--success);border-color:rgba(16,185,129,.25)}
.status-btn.paid:hover{background:rgba(16,185,129,.2)}
.status-btn.debt{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.2)}
.status-btn.debt:hover{background:rgba(239,68,68,.18)}

/* ====== TRASH BTN ====== */
.btn-trash{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .18s;background:transparent;cursor:pointer;opacity:.45;
}
.btn-trash svg{width:15px;height:15px}
.btn-trash:hover{background:rgba(239,68,68,.12);color:var(--danger);opacity:1;transform:scale(1.08)}

/* ====== EMPTY STATE ====== */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 20px;text-align:center;
}
.empty-icon{font-size:2.8rem;margin-bottom:12px;opacity:.6}
.empty-title{font-size:1rem;font-weight:700;color:var(--text-muted);margin-bottom:4px}
.empty-sub{font-size:.8rem;color:var(--text-muted);opacity:.7}

/* ====== SETTINGS ====== */
.settings-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:16px;
}
.settings-group{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;
}
.settings-full{grid-column:1/-1}
.settings-title{
  color:var(--primary);font-size:1rem;font-weight:800;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.setting-row{
  display:flex;justify-content:space-between;align-items:center;padding:12px 0;
  border-bottom:1px solid var(--border);gap:12px;min-height:48px;
}
.setting-row:last-child{border-bottom:none}
.setting-label{font-weight:500;font-size:.88rem}
.setting-hint{display:block;font-size:.72rem;color:var(--text-muted);margin-top:2px}
.settings-select{
  padding:6px 10px;border-radius:7px;background:var(--bg-input);border:1px solid var(--border);
  color:var(--text-main);cursor:pointer;font-size:.85rem;transition:border-color .15s;
}
.settings-select:hover{border-color:var(--border-hover)}
.settings-mini-input{
  width:58px;text-align:center;padding:5px 8px;border-radius:7px;
  background:var(--bg-input);border:1px solid var(--border);font-weight:600;transition:all .15s;
}
.settings-mini-input:focus{border-color:rgba(var(--primary-rgb),.5);box-shadow:0 0 0 2px var(--primary-glow)}

/* ====== SIZE PICKER ====== */
.size-picker{display:flex;background:var(--bg-input);padding:3px;border-radius:8px;border:1px solid var(--border)}
.size-btn{
  padding:4px 10px;border-radius:6px;font-size:.77rem;font-weight:600;cursor:pointer;
  background:transparent;color:var(--text-muted);transition:all .18s;
}
.size-btn.active{background:var(--bg-card);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ====== COLOR PICKER ====== */
.color-picker{display:flex;gap:7px;flex-wrap:wrap}
.color-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .18s,box-shadow .18s;
  border:2px solid transparent;
}
.color-dot:hover{transform:scale(1.1)}
.color-dot.active{border-color:var(--text-main);transform:scale(1.15)}

/* ====== TOGGLE ====== */
.toggle{
  position:relative;width:44px;height:24px;background:var(--bg-input);border-radius:20px;
  cursor:pointer;transition:.25s;border:1px solid var(--border);flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:var(--text-muted);
  border-radius:50%;transition:.25s;transform:scale(.85);
}
.toggle.on{background:var(--primary);border-color:var(--primary)}
.toggle.on::after{left:22px;background:#fff;transform:scale(1);box-shadow:0 2px 5px rgba(0,0,0,.2)}

/* ====== TEMPLATES ====== */
.tpl-builder{
  border:1px solid var(--border);border-radius:11px;padding:14px;
  background:var(--bg-input);margin-bottom:14px;
}
.tpl-inputs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tpl-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tpl-checks{display:flex;gap:14px;flex-wrap:wrap}
.check-label{display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer;font-weight:500}
.tpl-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.tpl-card{
  background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border);
  position:relative;display:flex;flex-direction:column;gap:4px;transition:border-color .15s;
}
.tpl-card:hover{border-color:var(--border-hover)}
.tpl-del{
  position:absolute;top:7px;right:9px;color:var(--text-muted);background:none;border:none;
  cursor:pointer;font-size:.85rem;opacity:.5;transition:opacity .15s;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
}
.tpl-del:hover{opacity:1;color:var(--danger)}
.tpl-name{font-weight:700;font-size:.88rem;padding-right:18px}
.tpl-meta{font-size:.75rem;color:var(--text-muted)}
.tpl-cats{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.tpl-cat{font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:700}
.tpl-empty{
  text-align:center;padding:28px;color:var(--text-muted);font-size:.85rem;
  border:1px dashed var(--border);border-radius:10px;line-height:1.5;
}

/* ====== CALCULATOR ====== */
.mini-calc{
  position:fixed;bottom:36px;right:36px;width:286px;background:var(--bg-card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);
  border-radius:20px;z-index:90;box-shadow:var(--shadow-lg);overflow:hidden;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
}
.calc-header{
  background:linear-gradient(135deg,var(--primary),color-mix(in srgb,var(--primary),#000 25%));
  color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
  cursor:move;font-weight:700;touch-action:none;user-select:none;
}
.calc-header-left{display:flex;align-items:center;gap:6px;font-size:.9rem}
.calc-close{
  background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;
  border-radius:6px;display:grid;place-items:center;cursor:pointer;transition:background .15s;
}
.calc-close svg{width:14px;height:14px}
.calc-close:hover{background:rgba(255,255,255,.25)}
.calc-display{
  background:rgba(0,0,0,.12);padding:16px 18px 12px;text-align:right;min-height:72px;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.calc-prev{font-size:.85rem;color:rgba(255,255,255,.4);font-family:monospace;margin-bottom:2px}
.t-light .calc-prev{color:var(--text-muted)}
.calc-curr{font-size:2rem;font-weight:300;font-family:monospace;letter-spacing:-1px;word-break:break-all;line-height:1}
.calc-pad{display:grid;grid-template-columns:repeat(4,1fr);padding:10px;gap:5px}
.calc-btn{
  border-radius:10px;font-size:1.05rem;height:52px;background:var(--bg-input);transition:all .12s;
  color:var(--text-main);display:grid;place-items:center;font-weight:500;
  border:1px solid transparent;
}
.calc-btn:hover{background:var(--bg-card-hover);border-color:var(--border)}
.calc-btn:active{transform:scale(.92);background:var(--bg-card-hover)}
.calc-btn.func{color:var(--text-muted);background:rgba(148,163,184,.1)}
.calc-btn.op{color:var(--primary);font-weight:700;background:rgba(var(--primary-rgb),.1)}
.calc-btn.op:hover{background:rgba(var(--primary-rgb),.18)}
.calc-btn.eq,.calc-btn.eq-tall{background:var(--primary);color:#fff;font-weight:700;font-size:1.2rem}
.calc-btn.eq:hover,.calc-btn.eq-tall:hover{filter:brightness(1.1)}

/* ====== MODAL ====== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  z-index:100;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .18s ease-out;
}
.modal-box{
  background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;
  width:92%;max-width:400px;box-shadow:var(--shadow-lg);animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
}
.modal-icon-wrap{
  width:52px;height:52px;background:rgba(239,68,68,.1);border-radius:14px;
  display:grid;place-items:center;color:var(--danger);margin:0 auto 14px;
}
.modal-icon-wrap svg{width:26px;height:26px}
.modal-title{font-size:1.15rem;font-weight:800;margin-bottom:6px}
.modal-desc{color:var(--text-muted);font-size:.88rem;margin-bottom:22px;line-height:1.5}
.modal-actions{display:flex;justify-content:center;gap:10px}

/* ====== TOAST ====== */
.toast-area{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  pointer-events:auto;padding:12px 16px;border-radius:12px;font-weight:600;font-size:.87rem;
  display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:var(--bg-card);
  box-shadow:var(--shadow-lg);animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);
  min-width:200px;max-width:320px;
}
.toast-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.toast-icon svg{width:16px;height:16px}
.toast-success{border-left:3px solid var(--success)}
.toast-success .toast-icon{color:var(--success)}
.toast-error{border-left:3px solid var(--danger)}
.toast-error .toast-icon{color:var(--danger)}
.toast-info{border-left:3px solid rgba(var(--primary-rgb),1)}
.toast-info .toast-icon{color:var(--primary)}
.toast.out{animation:slideOut .25s ease-in forwards}

/* ====== ANIMATIONS ====== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tab-fade{animation:fadeIn .22s ease-out}

/* ====== MOBILE ====== */
@media(max-width:768px){
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;width:100%;height:auto;flex-direction:row;
    border-right:none;border-top:1px solid var(--border);z-index:50;padding:3px 2px 0;
    background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .logo-area,.sidebar-footer{display:none}
  .nav-menu{
    flex-direction:row;padding:0;gap:0;overflow:visible;width:100%;
    justify-content:space-around;
  }
  .nav-item{
    flex-direction:column;padding:6px 4px 8px;font-size:.58rem;gap:3px;flex:1;
    justify-content:center;text-align:center;border-radius:0;border:none;
    min-width:0;
  }
  .nav-item.active{
    background:transparent;
    color:var(--primary);
    border:none;
    box-shadow:none;
  }
  .nav-item.active .nav-icon svg{color:var(--primary)}
  .nav-icon svg{width:20px;height:20px}
  .nav-label{font-size:.58rem;line-height:1}
  .content-scroll{padding:14px 12px 90px}
  .top-header{padding:0 14px;height:54px}
  .tab-toolbar{flex-direction:column;align-items:stretch}
  .toolbar-right{justify-content:flex-start}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-card-main{grid-column:span 2}
  .stat-value{font-size:1.35rem}
  .search-input{min-width:0}
  .toast-area{bottom:78px;right:10px;left:10px}
  .mini-calc{bottom:78px;right:3%;width:94%;left:3%}
  .settings-grid{grid-template-columns:1fr}
  .settings-full{grid-column:1}
  .period-pill .pp-btn{padding:5px 8px;font-size:.75rem}

  /* Mobile cards for tables */
  .m-cards thead{display:none}
  .m-cards tbody tr{
    display:block;background:var(--bg-card);border-radius:12px;margin-bottom:8px;
    padding:10px 14px;border:1px solid var(--border);
  }
  .m-cards tbody td{
    display:flex;justify-content:space-between;align-items:center;
    padding:5px 0;border:none!important;
  }
  .m-cards tbody td::before{
    content:attr(data-label);font-weight:700;color:var(--text-muted);font-size:.7rem;
    text-transform:uppercase;margin-right:10px;white-space:nowrap;letter-spacing:.4px;
  }
  .m-cards tbody td .tinput{text-align:right}
  .m-cards tfoot{display:none}
}

@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr}
  .stat-card-main{grid-column:span 1}
}
